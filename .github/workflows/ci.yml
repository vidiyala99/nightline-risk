name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    # Nightly matrix at 07:00 UTC — exercises LLM providers against the
    # underwriting eval suite when API keys are configured as secrets.
    # Skipped silently for forks (no secrets) by the conditional below.
    - cron: "0 7 * * *"

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q -p no:flaky

  backend-postgres:
    name: Backend tests (Postgres fidelity)
    runs-on: ubuntu-latest
    # The default backend job runs on SQLite, which doesn't enforce FKs or store
    # JSON columns as strings — so the prod-only Postgres regression classes
    # (FK-ordering, JSON-string reads) are structurally invisible there. This
    # lane runs the same suite against real Postgres so those bugs fail in CI
    # instead of in production. conftest honors the DATABASE_URL env (setdefault).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: tsr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run backend tests against Postgres
        working-directory: backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/tsr_test
          TESTING: "1"
        run: python -m pytest -q -p no:flaky

  evals:
    name: Backend eval suite (deterministic baseline gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run eval suite against committed baseline
        working-directory: backend
        run: python -m app.evals.runner --compare-baseline

      - name: Run calibration gate against committed baseline
        working-directory: backend
        run: python -m scripts.run_calibration --compare-baseline

      - name: Run copilot eval gate against committed baseline
        working-directory: backend
        run: python -m app.evals.copilot_runner --compare-baseline

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: backend/app/evals/results/*
          retention-days: 30

  evals-matrix:
    name: Nightly LLM provider matrix
    # Runs only on the scheduled cron — keeps PRs fast and avoids burning
    # tokens on every push. Manually triggerable via gh workflow run.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      # Continue past a single provider failure so we still see results for
      # the other stacks — one provider being down shouldn't blank the run.
      fail-fast: false
      matrix:
        include:
          - memo: anthropic
            risk: anthropic
            stack: anthropic-only
          - memo: gemini
            risk: gemini
            stack: gemini-only
          - memo: anthropic
            risk: stub
            stack: anthropic-memo-stub-risk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Run eval matrix row
        id: eval
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Skip silently if this row's primary key is missing — keeps the
          # workflow green for forks / contributors without secrets.
          if [ "${{ matrix.memo }}" = "anthropic" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ANTHROPIC_API_KEY not set; skipping row."
            exit 0
          fi
          if [ "${{ matrix.memo }}" = "gemini" ] && [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY not set; skipping row."
            exit 0
          fi
          python -m app.evals.runner \
            --provider ${{ matrix.memo }} \
            --risk-provider ${{ matrix.risk }} \
            --compare-baseline

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ matrix.stack }}
          path: backend/app/evals/results/*
          retention-days: 30

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Design-system lint (token-drift guard)
        run: node scripts/design-lint.mjs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (eslint)
        working-directory: frontend
        # Errors fail the build; the 47 react-hooks/set-state-in-effect advisories
        # are warnings (exit 0) until the burndown lands --max-warnings 0 (Track 4).
        run: npm run lint

      - name: Run frontend unit tests (vitest)
        working-directory: frontend
        run: npm run test:unit

      - name: Run incidentView contract test
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
