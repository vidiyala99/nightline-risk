name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npm install @playwright/test

      - name: Install Playwright browsers
        run: ./node_modules/.bin/playwright install --with-deps chromium

      # Push events trigger Vercel + Railway redeploys that race with this job.
      # Wait until backend + frontend are responsive AND login actually works
      # before launching Playwright. Without this, Playwright would otherwise
      # hit a cold backend and report misleading "login flow broken" failures
      # — exactly what happened on the 247b17e push run.
      - name: Wait for live deployments to warm up
        shell: bash
        run: |
          set -u
          # Railway-assigned public domain for the nightline-risk-api service
          # (project "bountiful-unity", created 2026-05-30).
          BACKEND="https://nightline-risk-api-production.up.railway.app"
          # Must match the Playwright baseURL (frontend/playwright.config.ts) so
          # warm-up actually verifies the deployment under test — not a stale,
          # always-up per-deployment URL.
          FRONTEND="https://nightline-app.vercel.app"
          DEADLINE=$((SECONDS + 300))

          # Initial grace period — gives Vercel + Railway time to begin rolling
          # the new build before we start polling.
          sleep 30

          while [ $SECONDS -lt $DEADLINE ]; do
            backend_code=$(curl -fsS -o /dev/null -w "%{http_code}" \
              "$BACKEND/api/venues" 2>/dev/null || echo "000")
            frontend_code=$(curl -fsS -o /dev/null -w "%{http_code}" \
              "$FRONTEND/login" 2>/dev/null || echo "000")

            if [ "$backend_code" = "200" ] && [ "$frontend_code" = "200" ]; then
              # Both surfaces respond — final smoke: the demo login round-trips
              # cleanly. This catches "backend booted but DB not yet seeded"
              # and "backend up but auth router not mounted" states.
              login_code=$(curl -fsS -o /dev/null -w "%{http_code}" \
                -X POST "$BACKEND/api/auth/login" \
                -H "content-type: application/json" \
                -d '{"email":"broker@nightline.risk","password":"demo123"}' \
                2>/dev/null || echo "000")
              if [ "$login_code" = "200" ]; then
                echo "::notice::Deployments warm at t=${SECONDS}s — login smoke passed"
                exit 0
              fi
              echo "[t=${SECONDS}s] backend+frontend up, login=$login_code, retrying…"
            else
              echo "[t=${SECONDS}s] backend=$backend_code frontend=$frontend_code"
            fi
            sleep 10
          done

          echo "::error::Timed out after 5min waiting for deployments to warm up"
          exit 1

      - name: Run E2E tests
        run: ./node_modules/.bin/playwright test
        env:
          # Tests run against the live Vercel deployment — no local server needed
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: frontend/playwright-results.xml
          retention-days: 14

      - name: Upload test screenshots / traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: frontend/test-results/
          retention-days: 7
