# Build with the committed Dockerfile (python:3.12-slim) rather than nixpacks:
# nixpacks fails to build the backend's native deps (chromadb/onnxruntime), and
# this is the same image Render builds successfully. dockerfilePath is relative
# to the service Root Directory (backend/).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# No startCommand: it would override the Dockerfile CMD and run in exec form,
# which does NOT expand shell vars — uvicorn would receive the literal "$PORT"
# and crash-loop. The Dockerfile CMD uses `sh -c ... ${PORT:-8080}` so Railway's
# injected $PORT expands correctly. Let the image's CMD own startup.
[deploy]
restartPolicyType = "on_failure"
