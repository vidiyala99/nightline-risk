# Build with the committed Dockerfile (python:3.12-slim) rather than nixpacks:
# nixpacks fails to build the backend's native deps (chromadb/onnxruntime), and
# this is the same image Render builds successfully. dockerfilePath is relative
# to the service Root Directory (backend/).
[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
