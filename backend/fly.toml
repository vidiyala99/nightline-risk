# Fly.io config for the Nightline Risk backend (FastAPI + Postgres).
# Created during the Railway -> Fly migration. Run `fly deploy` from backend/.
app = "nightline-risk-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  # Local-disk storage is EPHEMERAL on Fly too (lost on machine restart/redeploy).
  # The real fix is the S3 backend (STORAGE_BACKEND=s3) — see docs/go-live-readiness.md.
  STORAGE_BACKEND = "local"

[http_service]
  internal_port = 8080
  force_https = true
  # Always-on (the reason we chose Fly): no cold start. Flip auto_stop_machines
  # to "stop" + min_machines_running = 0 to trade responsiveness for lower cost.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  # 1GB: chromadb + the agent stack can exceed 512MB and OOM-crash-loop on boot
  # (another 502 source). Drop to 512 only after confirming the boot footprint.
  memory = "1gb"
  cpus = 1
