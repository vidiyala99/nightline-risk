[pytest]
testpaths = tests
norecursedirs = .pytest_cache pytest-cache-files-*
# --strict-markers: an unregistered marker is an error, not a silent typo.
addopts = --strict-markers
markers =
    unit: pure-logic test, no app/DB/TestClient (fast inner loop) — auto-applied
    integration: touches the app/DB stack (TestClient/session/tables) — auto-applied
